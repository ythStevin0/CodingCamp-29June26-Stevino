<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<main class="dashboard">

  <!-- HERO / GREETING -->
  <section class="hero card">
    <div class="hero-content">
      <div class="hero-top">
        <div class="hero-date">
          <svg viewBox="0 0 24 24" class="icon"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
          <span id="dateLabel">Hari, Tanggal</span>
        </div>
        <div class="hero-actions">
          <div class="hero-clock">
            <svg viewBox="0 0 24 24" class="icon icon-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
            <time id="clock">00:00:00</time>
          </div>
          <button id="themeToggle" class="icon-btn" aria-label="Ganti tema terang/gelap">
            <svg viewBox="0 0 24 24" class="icon"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
          </button>
          <div class="notif-wrap">
            <button id="bellBtn" class="icon-btn" aria-label="Notifikasi tugas">
              <svg viewBox="0 0 24 24" class="icon"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
              <span id="bellBadge" class="bell-badge hidden" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </div>

      <h1 class="greeting-text">
        <span id="greetingPrefix">Selamat Pagi</span>,
        <span id="greetingName" class="greeting-name" tabindex="0" role="button" title="Klik untuk ubah nama">Sahabat</span>
        <button id="editNameBtn" class="edit-name-btn" type="button" aria-label="Ubah nama" title="Ubah nama">
          <svg viewBox="0 0 24 24" class="icon icon-xs"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </button>
        <span class="wave">👋</span>
      </h1>
      <input type="text" id="nameInput" class="name-input" placeholder="Tulis namamu, lalu tekan Enter" maxlength="24" autocomplete="off">
    </div>

    <div class="hero-illustration" aria-hidden="true">
      <svg viewBox="0 0 480 220" preserveAspectRatio="xMidYMid slice">
        <defs>
          <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#bcdcff"/>
            <stop offset="100%" stop-color="#eef6ff"/>
          </linearGradient>
          <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#cfe6ff"/>
            <stop offset="100%" stop-color="#eaf4ff"/>
          </linearGradient>
          <linearGradient id="mtn3" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#a9c8f0"/>
            <stop offset="100%" stop-color="#c7ddf7"/>
          </linearGradient>
          <linearGradient id="mtn2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#87abe0"/>
            <stop offset="100%" stop-color="#a9c8f0"/>
          </linearGradient>
          <linearGradient id="mtn1" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#5f86c9"/>
            <stop offset="100%" stop-color="#87abe0"/>
          </linearGradient>
        </defs>

        <rect width="480" height="220" fill="url(#sky)"/>
        <circle cx="330" cy="55" r="26" fill="#ffe9a8"/>
        <circle cx="330" cy="55" r="40" fill="#ffe9a8" opacity="0.35"/>

        <path d="M60 45 Q80 30 105 45 Q120 32 140 45" stroke="#7fa3d8" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M180 70 Q200 55 225 70 Q240 57 260 70" stroke="#7fa3d8" stroke-width="3" fill="none" stroke-linecap="round"/>

        <ellipse cx="120" cy="40" rx="34" ry="12" fill="#ffffff" opacity="0.8"/>
        <ellipse cx="380" cy="80" rx="30" ry="10" fill="#ffffff" opacity="0.7"/>

        <path d="M0 150 L60 90 L100 130 L150 70 L210 150 Z" fill="url(#mtn3)"/>
        <path d="M120 150 L190 85 L235 125 L300 60 L370 150 Z" fill="url(#mtn2)"/>
        <path d="M250 160 L310 100 L345 135 L400 75 L480 160 Z" fill="url(#mtn1)"/>

        <path d="M150 70 L163 92 L137 92 Z" fill="#ffffff"/>
        <path d="M300 60 L314 84 L286 84 Z" fill="#ffffff"/>

        <g fill="#3c6b45">
          <path d="M20 180 L30 155 L40 180 Z"/>
          <path d="M32 190 L42 160 L52 190 Z"/>
          <path d="M420 190 L430 158 L440 190 Z"/>
          <path d="M436 195 L448 165 L460 195 Z"/>
          <path d="M60 195 L70 168 L80 195 Z"/>
        </g>

        <rect x="0" y="178" width="480" height="42" fill="url(#lake)"/>
      </svg>
    </div>
  </section>

  <!-- MAIN GRID -->
  <div class="grid-main">

    <!-- FOCUS TIMER -->
    <section class="card card-timer">
      <div class="card-head">
        <div class="card-title">
          <svg viewBox="0 0 24 24" class="icon icon-accent"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
          <h2>Focus Timer</h2>
        </div>
        <div class="pomodoro-select" id="pomodoroSelect">
          <button type="button" data-mins="15">15</button>
          <button type="button" data-mins="25" class="active">25</button>
          <button type="button" data-mins="45">45</button>
        </div>
      </div>

      <div class="timer-ring-wrap">
        <svg class="timer-ring" viewBox="0 0 200 200">
          <circle class="ring-track" cx="100" cy="100" r="90"></circle>
          <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="90"></circle>
        </svg>
        <div class="timer-center">
          <div class="timer-display" id="timerDisplay">25:00</div>
          <div class="timer-label">Waktu Fokus</div>
        </div>
      </div>

      <div class="timer-btns-wrap">
        <button id="startBtn" class="btn btn-primary btn-block">
          <svg viewBox="0 0 24 24" class="icon"><path d="M8 5v14l11-7Z"/></svg>
          Mulai
        </button>
        <div class="timer-row">
          <button id="stopBtn" class="btn btn-secondary">
            <svg viewBox="0 0 24 24" class="icon"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
            Jeda
          </button>
          <button id="resetBtn" class="btn btn-secondary">
            <svg viewBox="0 0 24 24" class="icon"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg>
            Ulangi
          </button>
        </div>
      </div>
    </section>

    <!-- TO-DO LIST -->
    <section class="card card-todo">
      <div class="card-head">
        <div class="card-title">
          <svg viewBox="0 0 24 24" class="icon icon-accent"><path d="M9 11l3 3 6-6"/><rect x="3" y="4" width="18" height="17" rx="4"/></svg>
          <h2>Tugas Hari Ini</h2>
          <span class="count-badge" id="taskCount">0/0</span>
        </div>
      </div>

      <form id="taskForm" class="task-form">
        <input type="text" id="taskInput" placeholder="Tambah tugas baru…" autocomplete="off">
        <button type="submit" class="btn btn-primary">Tambah</button>
      </form>

      <div class="task-toolbar">
        <div class="filter-group" id="filterGroup">
          <button type="button" data-filter="all" class="active">Semua</button>
          <button type="button" data-filter="active">Aktif</button>
          <button type="button" data-filter="done">Selesai</button>
        </div>
        <button type="button" id="sortBtn" class="sort-btn">
          Urutkan A–Z
          <svg viewBox="0 0 24 24" class="icon icon-xs"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>

      <ul id="taskList" class="task-list"></ul>
      <p id="emptyState" class="empty-state">Belum ada tugas. Tambahkan satu di atas ✨</p>
    </section>

  </div>

  <!-- QUICK LINKS -->
  <section class="card card-links">
    <div class="card-head">
      <div class="card-title">
        <svg viewBox="0 0 24 24" class="icon icon-accent"><path d="M9 15l6-6M8 8l1.5-1.5a4 4 0 1 1 5.7 5.7L14 13M16 16l-1.5 1.5a4 4 0 1 1-5.7-5.7L10 11"/></svg>
        <h2>Tautan Cepat</h2>
      </div>
    </div>

    <form id="linkForm" class="link-form">
      <input type="text" id="linkName" placeholder="Nama tautan" autocomplete="off">
      <input type="url" id="linkUrl" placeholder="https://…" autocomplete="off">
      <button type="submit" class="btn btn-primary">
        <svg viewBox="0 0 24 24" class="icon"><path d="M12 5v14M5 12h14"/></svg>
        Tambah Link
      </button>
    </form>

    <div id="linkList" class="link-grid"></div>
  </section>

</main>

<script src="js/script.js"></script>
</body>
</html>
